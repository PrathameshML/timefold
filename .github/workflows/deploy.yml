name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
      - master
      - prathamesh

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Quarkus Application
        run: mvn clean package -DexcludedGroups="extreme,benchmark,diagnostic"

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/quarkus-app"
          target: "~/shift-app"
          strip_components: 1

      - name: Restart Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Writing environment secrets..."
            sudo mkdir -p /etc/systemd/system/quarkus-app.service.d
            sudo tee /etc/systemd/system/quarkus-app.service.d/override.conf > /dev/null <<EOF
            [Service]
            Environment=DB_URL=${{ secrets.DB_URL }}
            Environment=DB_USER=${{ secrets.DB_USER }}
            Environment=DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF

            echo "Reloading and restarting service..."
            sudo systemctl daemon-reload
            sudo systemctl restart quarkus-app

            echo "Checking status..."
            sudo systemctl status quarkus-app --no-pager