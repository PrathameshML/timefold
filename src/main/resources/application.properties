# ========================================
#  SERVER & PORT
# ========================================
quarkus.http.port=8083


# ========================================
#  SERVE BUILT FRONTEND (from build/ ? META-INF/resources)
# ========================================
quarkus.http.static-resources.path-prefix=/
quarkus.http.static-resources.index-page=index.html
quarkus.http.static-resources.enabled=true
quarkus.vertx.max-event-loop-execute-time=1000
# Optional: No cache in dev (auto-refresh)
%dev.quarkus.http.static-resources.cache-control=no-cache

# ========================================
#  DISABLE QUARKUS DEV UI
# ========================================
%dev.quarkus.http.enable-dev-ui=false

# ========================================
#  CORS (Required for fetch from same origin)
# ========================================
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=origin,content-type,accept,authorization
quarkus.http.cors.exposed-headers=content-disposition

# ========================================
#  LIVE RELOAD (Auto-refresh on code change)
# ========================================
%dev.quarkus.live-reload.enabled=true

# ========================================
#  LOGGING (Optional: Reduce noise)
# ========================================
%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."io.quarkus".level=INFO

# ========================================
#  PRODUCTION MODE (When building JAR)
# ========================================
%prod.quarkus.http.port=8083
%prod.quarkus.http.static-resources.path-prefix=/
%prod.quarkus.http.static-resources.index-page=index.html

# ========================================
#  LOCAL DEV DATABASE (Your Laptop)
# ========================================
quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/timefold_db
quarkus.datasource.username=root
quarkus.datasource.password=root123

# Connection Pool (Recommended)
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20

# ========================================
#  PRODUCTION DATABASE (Your EC2 Server)
# ========================================
# When you run `mvn clean package`, it will automatically use these %prod settings!
%prod.quarkus.datasource.db-kind=mysql
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
quarkus.log.category."ai.timefold.solver.core.impl.constructionheuristic".level=TRACE